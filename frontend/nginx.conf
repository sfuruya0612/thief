# WebSocket アップグレード時のみ Connection: upgrade を転送する (EC2 Start Session / ECS Exec)。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8088;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API / WebSocket (EC2 Start Session, ECS Exec) は backend コンテナへリバースプロキシする。
    # frontend と backend を単一オリジン (http://thief.local:8088 等) に統合し、
    # ブラウザの WebSocket Origin チェックを同一オリジン判定で通すため。
    # proxy_pass に URI を付けないため location にマッチした URI (/api/...) をそのまま転送する。
    location /api/ {
        proxy_pass http://backend:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        # SSM Start Session / ECS Exec は長時間接続のためタイムアウトを伸ばす。
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA フォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }
}
