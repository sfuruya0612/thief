services:
  backend:
    build:
      context: ./backend
      secrets:
        - custom_ca
    ports:
      - "8089:8089"
    environment:
      - THIEF_LISTEN_ADDR=0.0.0.0:8089
      - THIEF_WEB_ORIGINS=localhost:8088,127.0.0.1:8088,thief.local:8088
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
    volumes:
      # ホストの AWS 認証情報 (config/credentials/SSO cache) を共有する。
      - ~/.aws:/root/.aws:ro
      # クエリスニペット (.sql) をホストと共有し、コンテナ再作成後も保持する。
      - /tmp/thief:/tmp/thief

  frontend:
    build:
      context: ./frontend
      args:
        # 空文字を指定し、nginx の /api/ リバースプロキシ (frontend/nginx.conf) 経由で
        # 同一オリジンから backend を呼び出す。thief.local 等のカスタムドメインでも
        # ホスト名をハードコードせずに動作させるため。
        VITE_API_BASE: ""
      secrets:
        - custom_ca
    ports:
      - "8088:8088"
    depends_on:
      - backend

# custom_ca: 企業ネットワークの TLS インスペクション CA など、build 中の go mod download /
# npm ci が参照する追加 CA 証明書を任意で指定する。環境変数 CUSTOM_CA_CERT にホスト側の CA
# バンドルファイル (PEM) のパスを設定すると各 Dockerfile に安全に注入される (ビルドキャッシュ/
# イメージ履歴には残らない)。未設定時は空ファイルを渡し何もしない。
secrets:
  custom_ca:
    file: ${CUSTOM_CA_CERT:-/dev/null}
